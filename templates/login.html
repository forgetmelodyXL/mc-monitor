<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - MC 服务器监控</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <div class="flash-container">
            {% for category, message in messages %}
                <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
{% endwith %}
{% from "base.html" import csrf_input with context %}
<div class="auth-card">
    <div class="auth-header" style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <h1>⛏ MC 服务器监控</h1>
            <p class="auth-sub">登录以查看你的服务器状态</p>
        </div>
    </div>
    <form class="auth-form" method="POST">
        {{ csrf_input() }}
        <div class="form-group">
            <label for="username">用户名 / 邮箱</label>
            <input type="text" id="username" name="username" required autocomplete="username" autofocus placeholder="用户名或邮箱">
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">登录</button>
    </form>
    <p class="auth-footer">
        还没有账号？<a href="{{ url_for('register') }}">立即注册</a>
    </p>
</div>
<script>
(function () {
    var toggle = document.getElementById('darkModeToggle');
    var STORAGE_KEY = 'mcmonitor_dark_mode';

    function applyDarkMode(isDark) {
        if (isDark) {
            document.body.classList.add('dark-mode');
            toggle.textContent = '☀️';
            toggle.title = '切换到浅色模式';
        } else {
            document.body.classList.remove('dark-mode');
            toggle.textContent = '🌙';
            toggle.title = '切换到深色模式';
        }
    }

    function init() {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved === null) {
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyDarkMode(prefersDark);
        } else {
            applyDarkMode(saved === '1');
        }
    }

    toggle.addEventListener('click', function () {
        var isDark = document.body.classList.contains('dark-mode');
        var newIsDark = !isDark;
        applyDarkMode(newIsDark);
        localStorage.setItem(STORAGE_KEY, newIsDark ? '1' : '0');
    });

    init();
})();

// ---- 按钮点击反馈 ----
(function () {
    function showToast(msg, type) {
        var c = document.getElementById('toastContainer');
        if (!c) { c = document.createElement('div'); c.id = 'toastContainer'; c.className = 'toast-container'; document.body.appendChild(c); }
        var t = document.createElement('div');
        t.className = 'toast toast-' + (type || 'info');
        var icons = { success: '✓', error: '✗', info: 'ℹ' };
        t.innerHTML = '<span class="toast-icon">' + (icons[type] || '') + '</span><span class="toast-msg">' + msg + '</span><span class="toast-close" onclick="this.parentElement.remove()">x</span>';
        c.appendChild(t);
        setTimeout(function () { t.style.animation = 'toastOut 0.3s ease forwards'; setTimeout(function () { if (t.parentElement) t.remove(); }, 300); }, 4000);
    }

    document.addEventListener('submit', function (e) {
        var btn = e.target.querySelector('button[type="submit"]');
        if (!btn || btn.classList.contains('btn-saving')) return;
        btn.classList.add('btn-saving');
        btn.textContent = '登录中...';
    });

    var flashes = document.querySelectorAll('.flash');
    flashes.forEach(function (f) {
        var isError = f.classList.contains('flash-error');
        showToast(f.textContent.trim(), isError ? 'error' : 'success');
        f.style.display = 'none';
    });
})();
</script>
</body>
</html>
