version: "3.8"

services:
  mc-monitor:
    build: .
    container_name: mc-monitor
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MCMONITOR_ENV=production
      - MCMONITOR_SECRET_KEY=${MCMONITOR_SECRET_KEY:-change-me-in-production}
      - MCMONITOR_HOST=0.0.0.0
      - MCMONITOR_PORT=5000
      - MCMONITOR_NOBROWSER=1
      - MCMONITOR_LOG_LEVEL=INFO
      - MCMONITOR_BOOTSTRAP_ADMIN=${MCMONITOR_BOOTSTRAP_ADMIN:-0}
      - MCMONITOR_BOOTSTRAP_USERNAME=${MCMONITOR_BOOTSTRAP_USERNAME:-admin}
      - MCMONITOR_BOOTSTRAP_PASSWORD=${MCMONITOR_BOOTSTRAP_PASSWORD:-}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s