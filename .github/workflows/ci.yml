name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app.py db.py main.py --count --max-line-length=120 --statistics --ignore=E127,E128,E241,E302,E401,E402,E501,F401,F811,F841,W292,W503

      - name: Run tests
        run: |
          python -m unittest test_app.py -v

  build:
    needs: test
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --name mc-monitor --add-data "templates;templates" --add-data "static;static" --hidden-import waitress --hidden-import db main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mc-monitor-exe
          path: dist/mc-monitor.exe